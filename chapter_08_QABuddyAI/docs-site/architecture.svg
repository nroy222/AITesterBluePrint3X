<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1050" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e293b;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="dataLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#059669;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="ingestionLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#2563eb;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="retrievalLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0.05" />
    </linearGradient>
    <linearGradient id="llmLayer" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#dc2626;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#dc2626;stop-opacity:0.05" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <marker id="arrowWhite" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1400" height="1050" fill="url(#bg)"/>

  <!-- Title -->
  <text x="700" y="45" text-anchor="middle" fill="#f1f5f9" font-size="26" font-weight="bold">QABuddy.ai — Architecture Diagram</text>
  <text x="700" y="70" text-anchor="middle" fill="#94a3b8" font-size="14">Multi-Source Hybrid RAG for QA Engineers</text>

  <!-- ============================================================== -->
  <!-- LAYER 1: DATA SOURCES (top) -->
  <!-- ============================================================== -->
  <rect x="30" y="95" width="1340" height="155" rx="10" fill="url(#dataLayer)" stroke="#059669" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="120" fill="#34d399" font-size="14" font-weight="bold">① DATA SOURCES (10 Knowledge Sources)</text>

  <!-- Source boxes in a grid - row 1 -->
  <rect x="50" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="142" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">01 - Selenium Framework</text>
  <text x="142" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">TypeScript / Java repo</text>

  <rect x="255" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="347" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">02 - Playwright Framework</text>
  <text x="347" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">TypeScript repo</text>

  <rect x="460" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="552" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">03 - Test Cases (5k)</text>
  <text x="552" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">CSV / structured</text>

  <rect x="665" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="757" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">04 - JIRA Tickets</text>
  <text x="757" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">JSON / REST API</text>

  <rect x="870" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="962" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">05 - Company Docs</text>
  <text x="962" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">Markdown / PDF</text>

  <rect x="1075" y="135" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="1167" y="158" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">06 - Figma Designs</text>
  <text x="1167" y="173" text-anchor="middle" fill="#a7f3d0" font-size="9">API exports</text>

  <!-- row 2 -->
  <rect x="50" y="190" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="142" y="213" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">07 - Meeting Notes</text>
  <text x="142" y="228" text-anchor="middle" fill="#a7f3d0" font-size="9">Markdown</text>

  <rect x="255" y="190" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="347" y="213" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">08 - Lucid Charts</text>
  <text x="347" y="228" text-anchor="middle" fill="#a7f3d0" font-size="9">CSV exports</text>

  <rect x="460" y="190" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="552" y="213" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">09 - PRD / SRS / BRD</text>
  <text x="552" y="228" text-anchor="middle" fill="#a7f3d0" font-size="9">PDF documents</text>

  <rect x="665" y="190" width="185" height="50" rx="6" fill="#064e3b" stroke="#059669" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="757" y="213" text-anchor="middle" fill="#6ee7b7" font-size="11" font-weight="bold">10 - Jenkins Logs</text>
  <text x="757" y="228" text-anchor="middle" fill="#a7f3d0" font-size="9">Console logs</text>

  <!-- ============================================================== -->
  <!-- LAYER 2: INGESTION PIPELINE -->
  <!-- ============================================================== -->
  <rect x="30" y="270" width="1340" height="175" rx="10" fill="url(#ingestionLayer)" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="295" fill="#60a5fa" font-size="14" font-weight="bold">② INGESTION PIPELINE</text>

  <!-- Loaders -->
  <rect x="50" y="310" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="150" y="336" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Per-Source Loaders</text>
  <text x="150" y="354" text-anchor="middle" fill="#bfdbfe" font-size="10">CSV · PDF · JSON · MD · TS · Java · LOG</text>

  <!-- Chunking -->
  <rect x="300" y="310" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="400" y="336" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Smart Chunking</text>
  <text x="400" y="354" text-anchor="middle" fill="#bfdbfe" font-size="10">Code · TestCases · JIRA · Docs · Logs</text>

  <!-- Embedding -->
  <rect x="550" y="310" width="240" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="670" y="336" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">BGE-M3 Embedding</text>
  <text x="670" y="354" text-anchor="middle" fill="#bfdbfe" font-size="10">Dense (1024d) + Sparse (lexical)</text>

  <!-- Manifest -->
  <rect x="840" y="310" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="940" y="336" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Idempotent Manifest</text>
  <text x="940" y="354" text-anchor="middle" fill="#bfdbfe" font-size="10">Diff-based re-ingest</text>

  <!-- Qdrant Store -->
  <rect x="1090" y="310" width="200" height="60" rx="8" fill="#1e3a5f" stroke="#3b82f6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1190" y="336" text-anchor="middle" fill="#93c5fd" font-size="12" font-weight="bold">Qdrant Vector DB</text>
  <text x="1190" y="354" text-anchor="middle" fill="#bfdbfe" font-size="10">Dense + Sparse vectors</text>

  <!-- Arrows from Data Sources to Ingestion -->
  <line x1="700" y1="250" x2="700" y2="270" stroke="#34d399" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Arrows inside ingestion -->
  <line x1="250" y1="340" x2="295" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="500" y1="340" x2="545" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="790" y1="340" x2="835" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="1040" y1="340" x2="1085" y2="340" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ============================================================== -->
  <!-- LAYER 3: RETRIEVAL PIPELINE -->
  <!-- ============================================================== -->
  <rect x="30" y="465" width="1340" height="220" rx="10" fill="url(#retrievalLayer)" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="490" fill="#a78bfa" font-size="14" font-weight="bold">③ RETRIEVAL PIPELINE (Hybrid RAG)</text>

  <!-- User Question -->
  <rect x="50" y="505" width="180" height="55" rx="25" fill="#3b0764" stroke="#8b5cf6" stroke-width="2" filter="url(#shadow)"/>
  <text x="140" y="530" text-anchor="middle" fill="#c4b5fd" font-size="12" font-weight="bold">User Question</text>
  <text x="140" y="547" text-anchor="middle" fill="#ddd6fe" font-size="9">via Chat UI</text>

  <!-- Condense -->
  <rect x="280" y="505" width="160" height="55" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="360" y="528" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Condense</text>
  <text x="360" y="545" text-anchor="middle" fill="#ddd6fe" font-size="9">Resolve pronouns</text>

  <!-- Rewrite -->
  <rect x="490" y="505" width="160" height="55" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="570" y="528" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Query Rewrite ✕3</text>
  <text x="570" y="545" text-anchor="middle" fill="#ddd6fe" font-size="9">Alternate phrasings</text>

  <!-- Hybrid Search -->
  <rect x="700" y="505" width="200" height="55" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="800" y="525" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">Hybrid Search</text>
  <text x="800" y="542" text-anchor="middle" fill="#ddd6fe" font-size="9">Dense (embed) + Sparse (BM25)</text>
  <text x="800" y="554" text-anchor="middle" fill="#ddd6fe" font-size="9">Qdrant named vectors</text>

  <!-- RRF Fusion -->
  <rect x="950" y="505" width="160" height="55" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1030" y="528" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">RRF Fusion</text>
  <text x="1030" y="545" text-anchor="middle" fill="#ddd6fe" font-size="9">Reciprocal rank</text>

  <!-- Reranker -->
  <rect x="1160" y="505" width="175" height="55" rx="8" fill="#3b0764" stroke="#8b5cf6" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="1247" y="528" text-anchor="middle" fill="#c4b5fd" font-size="11" font-weight="bold">bge-reranker-v2-m3</text>
  <text x="1247" y="545" text-anchor="middle" fill="#ddd6fe" font-size="9">Cross-encoder re-scoring</text>

  <!-- Arrows -->
  <line x1="230" y1="532" x2="275" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="440" y1="532" x2="485" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="650" y1="532" x2="695" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="900" y1="532" x2="945" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="1110" y1="532" x2="1155" y2="532" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- Mode Detection box -->
  <rect x="100" y="580" width="500" height="45" rx="8" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="350" y="600" text-anchor="middle" fill="#ddd6fe" font-size="11">
    <tspan font-weight="bold" fill="#c4b5fd">Mode Detection:</tspan>
    <tspan> Answer · Generate (test cases) · RCA (root cause) · Review (gaps/coverage)</tspan>
  </text>

  <!-- Prompt Building -->
  <rect x="650" y="580" width="450" height="45" rx="8" fill="#4c1d95" stroke="#a78bfa" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="875" y="600" text-anchor="middle" fill="#ddd6fe" font-size="11">
    <tspan font-weight="bold" fill="#c4b5fd">Prompt Builder:</tspan>
    <tspan> Mode-specific system prompt + top-6 chunks + conversation history</tspan>
  </text>

  <!-- Relevance Threshold -->
  <rect x="1150" y="580" width="185" height="45" rx="8" fill="#4c1d95" stroke="#f59e0b" stroke-width="1.2" filter="url(#shadow)"/>
  <text x="1242" y="600" text-anchor="middle" fill="#fde68a" font-size="10">Relevance Threshold</text>
  <text x="1242" y="615" text-anchor="middle" fill="#fef3c7" font-size="9">rerank > 0.22 → answer</text>

  <!-- ============================================================== -->
  <!-- LAYER 4: LLM + ANSWER -->
  <!-- ============================================================== -->
  <rect x="30" y="705" width="1340" height="155" rx="10" fill="url(#llmLayer)" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="50" y="730" fill="#f87171" font-size="14" font-weight="bold">④ LLM INFERENCE + CITED ANSWER</text>

  <!-- Arrow from retrieval to LLM -->
  <line x1="700" y1="685" x2="700" y2="700" stroke="#a78bfa" stroke-width="2" marker-end="url(#arrowWhite)"/>

  <!-- LLM box -->
  <rect x="200" y="745" width="320" height="70" rx="12" fill="#7f1d1d" stroke="#ef4444" stroke-width="2" filter="url(#shadow)"/>
  <text x="360" y="772" text-anchor="middle" fill="#fca5a5" font-size="13" font-weight="bold">Groq Inference (openai/gpt-oss-120b)</text>
  <text x="360" y="792" text-anchor="middle" fill="#fecaca" font-size="10">Streaming SSE · 120B open-weight LLM · temp 0.2</text>

  <!-- Citations -->
  <rect x="600" y="745" width="250" height="70" rx="8" fill="#7f1d1d" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="725" y="768" text-anchor="middle" fill="#fca5a5" font-size="12" font-weight="bold">Inline Citations</text>
  <text x="725" y="785" text-anchor="middle" fill="#fecaca" font-size="10">Source · File · Line · Score</text>
  <text x="725" y="800" text-anchor="middle" fill="#fecaca" font-size="10">[1] Selenium · [2] JIRA-123 · [3] PRD</text>

  <!-- Answer -->
  <rect x="920" y="745" width="250" height="70" rx="25" fill="#7f1d1d" stroke="#34d399" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="1045" y="768" text-anchor="middle" fill="#6ee7b7" font-size="14" font-weight="bold">✅ Cited Answer</text>
  <text x="1045" y="788" text-anchor="middle" fill="#a7f3d0" font-size="10">Streaming to Chat UI</text>

  <!-- Arrows -->
  <line x1="520" y1="780" x2="595" y2="780" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>
  <line x1="850" y1="780" x2="915" y2="780" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowWhite)"/>

  <!-- ============================================================== -->
  <!-- BOTTOM: TECH STACK LEGEND -->
  <!-- ============================================================== -->
  <rect x="30" y="880" width="1340" height="145" rx="10" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
  <text x="50" y="905" fill="#e2e8f0" font-size="14" font-weight="bold">TECH STACK</text>

  <rect x="50" y="920" width="300" height="45" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="200" y="940" text-anchor="middle" fill="#94a3b8" font-size="11">
    <tspan fill="#e2e8f0" font-weight="bold">Frontend:</tspan> HTML · CSS · JavaScript (SSE streaming)
  </text>
  <text x="200" y="956" text-anchor="middle" fill="#64748b" font-size="10">Flask Jinja2 templates + terminal-style chat UI</text>

  <rect x="380" y="920" width="240" height="45" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="500" y="940" text-anchor="middle" fill="#94a3b8" font-size="11">
    <tspan fill="#e2e8f0" font-weight="bold">Backend:</tspan> Flask · Python 3.13
  </text>
  <text x="500" y="956" text-anchor="middle" fill="#64748b" font-size="10">gunicorn multithreaded server</text>

  <rect x="650" y="920" width="250" height="45" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="775" y="940" text-anchor="middle" fill="#94a3b8" font-size="11">
    <tspan fill="#e2e8f0" font-weight="bold">LLM Provider:</tspan> Groq
  </text>
  <text x="775" y="956" text-anchor="middle" fill="#64748b" font-size="10">openai/gpt-oss-120b (120B params)</text>

  <rect x="930" y="920" width="240" height="45" rx="6" fill="#0f172a" stroke="#475569" stroke-width="1"/>
  <text x="1050" y="940" text-anchor="middle" fill="#94a3b8" font-size="11">
    <tspan fill="#e2e8f0" font-weight="bold">Vector DB:</tspan> Qdrant
  </text>
  <text x="1050" y="956" text-anchor="middle" fill="#64748b" font-size="10">Embedded (local) or Server (Droplet)</text>

  <text x="50" y="990" fill="#475569" font-size="10">Embedding: BAAI/bge-m3 (dense 1024d + sparse BM25) · Reranker: BAAI/bge-reranker-v2-m3 · Fusion: Reciprocal Rank Fusion (RRF, k=60)</text>
  <text x="50" y="1005" fill="#475569" font-size="10">Chunking: Per-source config (code 2000ch, testcases 1400ch, jira 4800ch, docs 2048ch, logs 2400ch) · Idempotent manifest-based incremental ingestion</text>
</svg>